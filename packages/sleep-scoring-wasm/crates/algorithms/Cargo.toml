[package]
name = "sleep-scoring-wasm"
version = "0.1.0"
edition = "2021"
description = "Sleep scoring algorithms compiled to WASM"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
csv = "1.3"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[dev-dependencies]
serde_json = "1"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "algorithms"
harness = false
