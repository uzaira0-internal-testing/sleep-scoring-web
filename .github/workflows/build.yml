name: Tauri Build

on:
  push:
    tags: ['tauri-v*']
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as prerelease'
        type: boolean
        default: false

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install wasm-pack
        shell: bash
        run: which wasm-pack || cargo install wasm-pack

      - name: Build WASM
        shell: bash
        run: |
          wasm-pack build --target web \
            --out-dir "$PWD/frontend/src/wasm/pkg" \
            packages/sleep-scoring-wasm/crates/algorithms

      - name: Install frontend dependencies
        working-directory: frontend
        shell: bash
        run: |
          npm install --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npx vite build

      - name: Validate updater config
        shell: bash
        run: |
          PUBKEY=$(jq -r '.plugins.updater.pubkey' src-tauri/tauri.conf.json)
          if [[ "$PUBKEY" == "REPLACE_WITH_PUBLIC_KEY" ]]; then
            echo "::error::Updater public key is still a placeholder! Run: npx @tauri-apps/cli signer generate"
            exit 1
          fi

      - name: Clean old bundle artifacts
        shell: bash
        run: find src-tauri/target -path '*/release/bundle' -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Install Tauri CLI v2
        run: npm install -g @tauri-apps/cli@^2

      - name: Build Tauri
        run: tauri build ${{ matrix.os == 'macos-latest' && '--target universal-apple-darwin' || '' }}
        env:
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.target }}
          path: |
            src-tauri/target/**/release/bundle/**/*.tar.gz
            src-tauri/target/**/release/bundle/**/*.nsis.zip
            src-tauri/target/**/release/bundle/**/*.sig
          if-no-files-found: error

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version and tag
        id: version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          if [[ "$REF_TYPE" == "tag" ]]; then
            TAG="$REF_NAME"
            VERSION="${TAG#tauri-v}"
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            TAG="tauri-v${VERSION}"
          fi

          PRERELEASE="false"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="true"
          fi
          if [[ "$INPUT_PRERELEASE" == "true" ]]; then
            PRERELEASE="true"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}, Tag: ${TAG}, Prerelease: ${PRERELEASE}"

      - name: Create tag for workflow_dispatch
        if: github.ref_type != 'tag'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name '*.tar.gz' -o -name '*.sig' \
            -o -name '*.dmg' -o -name '*.exe' -o -name '*.msi' \
            -o -name '*.nsis.zip' \
            -o -name '*.deb' -o -name '*.AppImage' \
          \) -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -la release-assets/

      - name: Generate latest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cd release-assets

          # GitHub replaces spaces with dots in release asset filenames
          sanitize() { echo "$1" | sed 's/ /./g'; }

          # --- macOS (universal) ---
          MAC_TARBALL=$(ls *.app.tar.gz 2>/dev/null | head -1 || true)
          MAC_SIG=""
          if [[ -n "$MAC_TARBALL" && -f "${MAC_TARBALL}.sig" ]]; then
            MAC_SIG=$(cat "${MAC_TARBALL}.sig")
          fi

          # --- Windows (NSIS zip for updater) ---
          WIN_NSIS_ZIP=$(ls *.nsis.zip 2>/dev/null | grep -v '.sig$' | head -1 || true)
          WIN_SIG=""
          if [[ -n "$WIN_NSIS_ZIP" && -f "${WIN_NSIS_ZIP}.sig" ]]; then
            WIN_SIG=$(cat "${WIN_NSIS_ZIP}.sig")
          fi

          # --- Linux (AppImage) ---
          LINUX_APPIMAGE=$(ls *.AppImage 2>/dev/null | grep -v '.sig$' | head -1 || true)
          LINUX_SIG=""
          if [[ -n "$LINUX_APPIMAGE" && -f "${LINUX_APPIMAGE}.sig" ]]; then
            LINUX_SIG=$(cat "${LINUX_APPIMAGE}.sig")
          fi

          # Build JSON dynamically — only include platforms with artifacts + signatures
          PLATFORMS=""
          if [[ -n "$MAC_TARBALL" && -n "$MAC_SIG" ]]; then
            MAC_URL="${BASE_URL}/$(sanitize "$MAC_TARBALL")"
            PLATFORMS="${PLATFORMS:+$PLATFORMS,}
              \"darwin-universal\": { \"signature\": \"${MAC_SIG}\", \"url\": \"${MAC_URL}\" },
              \"darwin-aarch64\": { \"signature\": \"${MAC_SIG}\", \"url\": \"${MAC_URL}\" },
              \"darwin-x86_64\": { \"signature\": \"${MAC_SIG}\", \"url\": \"${MAC_URL}\" }"
          fi
          if [[ -n "$WIN_NSIS_ZIP" && -n "$WIN_SIG" ]]; then
            WIN_URL="${BASE_URL}/$(sanitize "$WIN_NSIS_ZIP")"
            PLATFORMS="${PLATFORMS:+$PLATFORMS,}
              \"windows-x86_64\": { \"signature\": \"${WIN_SIG}\", \"url\": \"${WIN_URL}\" }"
          fi
          if [[ -n "$LINUX_APPIMAGE" && -n "$LINUX_SIG" ]]; then
            LINUX_URL="${BASE_URL}/$(sanitize "$LINUX_APPIMAGE")"
            PLATFORMS="${PLATFORMS:+$PLATFORMS,}
              \"linux-x86_64\": { \"signature\": \"${LINUX_SIG}\", \"url\": \"${LINUX_URL}\" }"
          fi

          if [[ -z "$PLATFORMS" ]]; then
            echo "::error::No platform artifacts with signatures found — cannot generate latest.json"
            ls -la
            exit 1
          fi

          cat > ../latest.json <<ENDJSON
          {
            "version": "v${VERSION}",
            "notes": "Release v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {${PLATFORMS}
            }
          }
          ENDJSON

          sed -i 's/^          //' ../latest.json

          echo "Generated latest.json:"
          cat ../latest.json

      - name: Copy latest.json to release assets
        run: cp latest.json release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: release-assets/*
