name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group dev
      - run: uv run ruff check sleep_scoring_web/
      - run: uv run ruff format --check sleep_scoring_web/

  backend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group dev
      - run: uv run basedpyright sleep_scoring_web/

  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group dev --group web
      - name: Run backend tests
        run: uv run pytest tests/web/ tests/unit/ -v --randomly-seed=last --tb=short --cov=sleep_scoring_web --cov-report=xml --cov-branch
        env:
          SITE_PASSWORD: testpass
          ADMIN_USERNAMES: testadmin
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  backend-schema-fuzzing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group dev --group web
      - name: Run Schemathesis API fuzzing
        run: uv run pytest tests/web/test_schema_fuzzing.py -v --tb=short
        env:
          SITE_PASSWORD: testpass
          ADMIN_USERNAMES: testadmin

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd frontend && npm ci
      - run: cd frontend && npx eslint src/

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd frontend && npm ci
      - name: Create WASM stub for module resolution
        run: mkdir -p frontend/src/wasm/pkg && echo "export {};" > frontend/src/wasm/pkg/sleep_scoring_wasm.js
      - run: cd frontend && npx tsc --noEmit

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd frontend && bun install
      - run: cd frontend && bun test

  mutation-testing:
    runs-on: ubuntu-latest
    needs: [backend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group dev --group web
      - name: Run mutation tests
        run: |
          uv run mutmut run \
            --paths-to-mutate "sleep_scoring_web/services/algorithms/" \
            --paths-to-mutate "sleep_scoring_web/services/marker_placement.py" \
            --paths-to-mutate "sleep_scoring_web/services/complexity.py" \
            --paths-to-mutate "sleep_scoring_web/services/metrics.py" \
            --tests-dir "tests/unit/" \
            --tests-dir "tests/web/" \
            --runner "uv run pytest tests/unit/test_algorithm_properties.py tests/unit/test_complexity.py tests/unit/test_sleep_metrics.py tests/web/test_marker_placement.py -x -q --tb=no"
          uv run mutmut results

  frontend-mutation:
    runs-on: ubuntu-latest
    needs: [frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd frontend && npm ci
      - name: Run Stryker mutation testing
        run: cd frontend && npx stryker run
        continue-on-error: true  # Advisory for now until baseline is established

  chromatic:
    runs-on: ubuntu-latest
    needs: [frontend-unit]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd frontend && npm ci
      - name: Build Storybook and publish to Chromatic
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: cd frontend && npx chromatic --project-token="$CHROMATIC_PROJECT_TOKEN" --auto-accept-changes=main

  e2e:
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd frontend && npm ci
      - run: cd frontend && npx playwright install --with-deps chromium firefox webkit
      - name: Create external network for Docker Compose
        run: docker network create traefik-apps || true
      - name: Start Docker stack
        run: |
          cd docker
          docker compose -f docker-compose.local.yml up -d --build
          for i in $(seq 1 60); do
            curl -sf http://localhost:8500/health && exit 0
            sleep 2
          done
          echo "Backend failed to start within 120s"
          docker compose -f docker-compose.local.yml logs backend
          exit 1
        env:
          POSTGRES_PASSWORD: ci_test_password
          SITE_PASSWORD: testpass
          ADMIN_USERNAMES: testadmin
      - name: Check contract drift
        run: bash scripts/check-contract-drift.sh http://localhost:8500
      - name: Run E2E tests
        run: cd frontend && npx playwright test --reporter=list
      - name: Run accessibility tests (axe-core)
        run: cd frontend && npx playwright test e2e/accessibility.spec.ts --reporter=list
      - name: Stop Docker stack
        if: always()
        run: cd docker && docker compose -f docker-compose.local.yml down
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: frontend/test-results/

  lighthouse:
    runs-on: ubuntu-latest
    needs: [e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd frontend && npm ci
      - name: Create external network for Docker Compose
        run: docker network create traefik-apps || true
      - name: Start Docker stack
        run: |
          cd docker
          docker compose -f docker-compose.local.yml up -d --build
          for i in $(seq 1 60); do
            curl -sf http://localhost:8501/login && exit 0
            sleep 2
          done
          echo "Frontend failed to start"
          exit 1
        env:
          POSTGRES_PASSWORD: ci_test_password
          SITE_PASSWORD: testpass
          ADMIN_USERNAMES: testadmin
      - name: Run Lighthouse CI
        run: cd frontend && npx lhci autorun
      - name: Stop Docker stack
        if: always()
        run: cd docker && docker compose -f docker-compose.local.yml down
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: frontend/.lighthouseci/

  load-test:
    runs-on: ubuntu-latest
    needs: [e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - name: Create external network for Docker Compose
        run: docker network create traefik-apps || true
      - name: Start Docker stack
        run: |
          cd docker
          docker compose -f docker-compose.local.yml up -d --build
          for i in $(seq 1 60); do
            curl -sf http://localhost:8500/health && exit 0
            sleep 2
          done
          echo "Backend failed to start"
          exit 1
        env:
          POSTGRES_PASSWORD: ci_test_password
          SITE_PASSWORD: testpass
          ADMIN_USERNAMES: testadmin
      - name: Run k6 smoke test
        run: k6 run --vus 2 --duration 15s tests/load/k6-api.js
        env:
          BASE_URL: http://localhost:8500
          SITE_PASSWORD: testpass
      - name: Stop Docker stack
        if: always()
        run: cd docker && docker compose -f docker-compose.local.yml down

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Python dependency audit
      - name: Install pip-audit
        run: uv tool install pip-audit
      - name: Audit Python dependencies
        run: uv export --no-hashes | pip-audit -r /dev/stdin --strict

      # Node dependency audit
      - name: Audit npm dependencies
        run: cd frontend && npm audit --audit-level=high

      # Python SAST with Bandit
      - name: Install Bandit
        run: uv tool install bandit
      - name: Run Bandit security scan
        run: bandit -r sleep_scoring_web/ -ll -ii --skip B101

      # Secret detection
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    runs-on: ubuntu-latest
    needs: [e2e]
    steps:
      - uses: actions/checkout@v4
      - name: Create external network
        run: docker network create traefik-apps || true
      - name: Build backend image
        run: |
          cd docker
          docker compose -f docker-compose.local.yml build backend
        env:
          POSTGRES_PASSWORD: ci_scan_password
      - name: Run Trivy scan on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sleep-scoring-web-local-backend'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  bundle-size:
    runs-on: ubuntu-latest
    needs: [frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd frontend && npm ci
      - name: Create WASM stub
        run: mkdir -p frontend/src/wasm/pkg && echo "export {};" > frontend/src/wasm/pkg/sleep_scoring_wasm.js
      - name: Build and check bundle size
        run: cd frontend && npx vite build && npx size-limit

  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv tool install vulture
      - name: Check for dead Python code
        run: vulture sleep_scoring_web/ --min-confidence 90
        continue-on-error: true  # Advisory — review findings manually
