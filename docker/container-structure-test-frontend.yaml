schemaVersion: "2.0.0"

fileExistenceTests:
  - name: "Built assets exist"
    path: /usr/share/nginx/html/index.html
    shouldExist: true
  - name: "Nginx config exists"
    path: /etc/nginx/conf.d/default.conf
    shouldExist: true
  - name: "Entrypoint script exists"
    path: /docker-entrypoint.sh
    shouldExist: true
  - name: "No source code in image"
    path: /app/src
    shouldExist: false
  - name: "No node_modules in image"
    path: /app/node_modules
    shouldExist: false

commandTests:
  - name: "nginx is available"
    command: "which"
    args: ["nginx"]
    exitCode: 0
  - name: "curl is available for healthcheck"
    command: "which"
    args: ["curl"]
    exitCode: 0
  - name: "Built JS bundle exists"
    command: "sh"
    args: ["-c", "ls /usr/share/nginx/html/assets/*.js | head -1"]
    exitCode: 0
  - name: "Entrypoint script is executable"
    command: "stat"
    args: ["-c", "%a", "/docker-entrypoint.sh"]
    expectedOutput: ["755"]
    exitCode: 0

metadataTest:
  exposedPorts: ["8080"]
  entrypoint: ["/docker-entrypoint.sh"]
  user: "appuser"
