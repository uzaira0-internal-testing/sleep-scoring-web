schemaVersion: "2.0.0"

fileExistenceTests:
  - name: "Python venv exists"
    path: /opt/venv/bin/python
    shouldExist: true
  - name: "Application code exists"
    path: /app/sleep_scoring_web/main.py
    shouldExist: true
  - name: "Upload directory exists"
    path: /app/uploads
    shouldExist: true
    permissions: "drwxr-xr-x"
    isExecutableBy: "owner"
  - name: "No .env file in image"
    path: /app/.env
    shouldExist: false
  - name: "No test files in image"
    path: /app/tests
    shouldExist: false

commandTests:
  - name: "Python version is 3.12"
    command: "/opt/venv/bin/python"
    args: ["--version"]
    expectedOutput: ["Python 3\\.12"]
  - name: "FastAPI is importable"
    command: "/opt/venv/bin/python"
    args: ["-c", "import fastapi; print(fastapi.__version__)"]
    exitCode: 0
  - name: "App module is importable"
    command: "/opt/venv/bin/python"
    args: ["-c", "from sleep_scoring_web.main import app; print(type(app))"]
    exitCode: 0
  - name: "curl is available for healthcheck"
    command: "which"
    args: ["curl"]
    exitCode: 0

metadataTest:
  env:
    - key: PATH
      value: "/opt/venv/bin:.*"
      isRegex: true
  exposedPorts: ["8000"]
  cmd: ["python", "-m", "uvicorn", "sleep_scoring_web.main:app", "--host", "0.0.0.0", "--port", "8000"]
  user: "appuser"
