server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # CRITICAL: Include MIME types for proper Content-Type headers
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/wasm;
    gzip_comp_level 6;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # TUS resumable upload endpoint (must be before general /api/ block)
    # proxy_redirect rewrites the Location header returned by tuspyserver so that
    # it includes the BASE_PATH (/sleep-scoring) when behind an external reverse proxy.
    # Without this, the browser follows Location: /api/v1/tus/files/{uuid} which
    # bypasses the external proxy's /sleep-scoring prefix → ERR_CONNECTION_ABORTED.
    location /api/v1/tus/ {
        proxy_pass http://backend:8000/api/v1/tus/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect ~^(https?://[^/]+)/api/v1/tus/(.*)$ $1/sleep-scoring/api/v1/tus/$2;
        client_max_body_size 0;  # Disable limit for chunked uploads
        proxy_request_buffering off;  # Stream chunks directly to backend
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # TUS under BASE_PATH — handles PATCH/HEAD requests redirected by proxy_redirect above
    location /sleep-scoring/api/v1/tus/ {
        proxy_pass http://backend:8000/api/v1/tus/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Ensure gzip for proxied JSON responses (belt+suspenders with FastAPI GZipMiddleware)
        gzip on;
        gzip_types application/json;
        gzip_min_length 1024;

        # Allow large file uploads (default 1MB is too small for CSV files)
        client_max_body_size 200M;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Health check endpoint — returns JSON for frontend connectivity check
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Static files with long-term caching (MIME types handled by include mime.types above)
    # Note: add_header in child blocks replaces ALL parent headers in Nginx,
    # so security headers must be repeated here.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # BASE_PATH support: when <base href="/sleep-scoring/"> is set,
    # the browser requests /sleep-scoring/assets/*, /sleep-scoring/registerSW.js, etc.
    # Strip the prefix and serve from the same root.
    location /sleep-scoring/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    location /sleep-scoring/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Service worker must never be cached — stale SW causes React error #310
    # (lazy chunks fail to load from old SW cache after deployment)
    location ~* (sw\.js|registerSW\.js|workbox.*\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA fallback - serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
