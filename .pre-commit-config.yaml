repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: basedpyright sleep_scoring_web/
        language: system
        types: [python]
        pass_filenames: false

      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint src/'
        language: system
        files: 'frontend/src/.*\.(ts|tsx)$'
        pass_filenames: false

      - id: clippy
        name: cargo clippy
        entry: bash -c 'cd packages/sleep-scoring-wasm && cargo clippy -- -D warnings'
        language: system
        files: 'packages/sleep-scoring-wasm/.*\.rs$'
        pass_filenames: false
